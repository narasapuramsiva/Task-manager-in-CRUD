<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Task Manager</h1>

    <form action="/add" method="POST">

        <input type="text"
               name="title"
               placeholder="Task Title"
               required>

        <input type="text"
               name="description"
               placeholder="Description">

        <button type="submit">Add Task</button>

    </form>

    <table>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for task in tasks %}
        <tr>

            <td>{{ task.id }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.description }}</td>
            <td>{{ task.status }}</td>

            <td>
                <a href="/update/{{ task.id }}">Update</a>
                <a href="/delete/{{ task.id }}">Delete</a>
            </td>

        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
